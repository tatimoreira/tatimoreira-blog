{% extends "base.html" %}
{% block title %}Blog{% endblock title %}
{% block content %}
<div class="w-full h-full px-4 md:px-6 text-xl text-gray-800 leading-normal">
    <h1 class="text-center text-3xl">Posts</h1>
    {% for post in posts %}
    <div class="mb-4">
        <a class="text-2xl font-semibold hover:underline" href="{{ post.file_name }}">{{ post.title }}</a>
    </div>
    {% endfor %}
</div>
{% endblock content %}
